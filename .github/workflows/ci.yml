name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # Rust / Soroban Smart Contracts
  # ─────────────────────────────────────────────
  contracts-fmt:
    name: "Contracts: Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: stellar-lend

  contracts-clippy:
    name: "Contracts: Clippy Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-lend/target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('stellar-lend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: stellar-lend

  contracts-build:
    name: "Contracts: Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-lend/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('stellar-lend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - name: Build
        run: cargo build --verbose
        working-directory: stellar-lend

  contracts-test:
    name: "Contracts: Tests"
    runs-on: ubuntu-latest
    needs: contracts-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            stellar-lend/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('stellar-lend/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-
      - name: Run tests
        run: cargo test --verbose
        working-directory: stellar-lend
      - name: Run cross-contract tests
        run: |
          cargo test --package hello-world --lib cross_contract_test --verbose -- --nocapture 2>&1 | tee cross_contract_test_report.txt
        working-directory: stellar-lend
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-contract-test-report
          path: stellar-lend/cross_contract_test_report.txt

  contracts-audit:
    name: "Contracts: Security Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run security audit
        run: cargo audit
        working-directory: stellar-lend

  # ─────────────────────────────────────────────
  # API (Node.js / TypeScript / Express)
  # ─────────────────────────────────────────────
  api-quality:
    name: "API: Lint, Type Check, Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: api/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api/coverage/

  # ─────────────────────────────────────────────
  # Oracle Service (Node.js / TypeScript / Vitest)
  # ─────────────────────────────────────────────
  oracle-quality:
    name: "Oracle: Lint, Type Check, Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: oracle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: oracle/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Test with coverage
        run: npm run test:coverage || true
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-coverage
          path: oracle/coverage/

  # ─────────────────────────────────────────────
  # Final quality gate — all checks must pass
  # ─────────────────────────────────────────────
  quality-gate:
    name: "Quality Gate"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - contracts-fmt
      - contracts-clippy
      - contracts-build
      - contracts-test
      - contracts-audit
      - api-quality
      - oracle-quality
    steps:
      - name: Check all jobs passed
        run: |
          echo "## Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          results=(
            "contracts-fmt:${{ needs.contracts-fmt.result }}"
            "contracts-clippy:${{ needs.contracts-clippy.result }}"
            "contracts-build:${{ needs.contracts-build.result }}"
            "contracts-test:${{ needs.contracts-test.result }}"
            "contracts-audit:${{ needs.contracts-audit.result }}"
            "api-quality:${{ needs.api-quality.result }}"
            "oracle-quality:${{ needs.oracle-quality.result }}"
          )

          failed=false
          for result in "${results[@]}"; do
            job="${result%%:*}"
            status="${result##*:}"
            if [ "$status" = "success" ]; then
              echo "✅ $job" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $job ($status)" >> $GITHUB_STEP_SUMMARY
              failed=true
            fi
          done

          if [ "$failed" = "true" ]; then
            echo ""
            echo "❌ Quality gate FAILED — one or more checks did not pass."
            echo "❌ Quality gate FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo ""
          echo "✅ All quality checks passed."
          echo "✅ Quality gate PASSED" >> $GITHUB_STEP_SUMMARY
